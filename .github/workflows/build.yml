# ORBit firmware — GitHub Actions build (ZMK / shield "vessel").
#
# Custom (not the reusable ZMK workflow) because the ZMK config lives under a
# nested zmk-config/ dir. The reusable workflow's `config_path` input only
# renames the config dir at the repo root; with a nested path, `west init -l
# zmk-config/config` anchors the west workspace at zmk-config/ (the parent of
# the manifest dir), but the reusable workflow then runs `west update` from the
# repo root and fails with "no west workspace found". This workflow instead runs
# every west step from the zmk-config/ topdir, so the nested layout the repo
# deliberately keeps (tracking only zmk-config/ + docs) works untouched.
#
# Container pinned to :4.1 to match ZMK main's Zephyr (v4.1.0+zmk-fixes).
# Upstream revisions are pinned in zmk-config/config/west.yml (zmk@main SHA,
# Hardware Model v2, board `xiao_ble` — the modern name for the XIAO nRF52840,
# chosen so the CAP1188 can use the stock microchip,cap12xx driver).
name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build (xiao_ble, vessel)
    container:
      image: zmkfirmware/zmk-build-arm:4.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # west init -l <dir> sets the workspace topdir to the PARENT of <dir>,
      # i.e. zmk-config/ here. All later west steps run from that topdir.
      - name: West init
        run: west init -l zmk-config/config

      - name: West update
        working-directory: zmk-config
        run: west update

      - name: Zephyr export
        working-directory: zmk-config
        run: west zephyr-export

      # ZMK_EXTRA_MODULES (not ZEPHYR_EXTRA_MODULES — ZMK's CMake overwrites
      # that, prepending ZMK_EXTRA_MODULES to its own module list) pulls in the
      # repo-local module with ORBit's custom drivers/processors.
      - name: Build vessel
        working-directory: zmk-config
        run: |
          west build -s zmk/app -b xiao_ble -- \
            -DSHIELD=vessel \
            -DZMK_CONFIG="$GITHUB_WORKSPACE/zmk-config/config" \
            -DZMK_EXTRA_MODULES="$GITHUB_WORKSPACE/zmk-config/modules/orbit"

      - name: Upload firmware (zmk.uf2)
        uses: actions/upload-artifact@v4
        with:
          name: vessel-xiao_ble
          path: zmk-config/build/zephyr/zmk.uf2
          if-no-files-found: warn
