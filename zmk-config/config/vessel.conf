# ---------------------------------------------------------------------------
# Vessel trackball — ZMK config (XIAO nRF52840 Sense Plus)
# ---------------------------------------------------------------------------

# --- Bluetooth ---
CONFIG_ZMK_BLE=y
# a little more range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# --- Power / sleep (big battery win) ---
CONFIG_ZMK_SLEEP=y
# deep sleep after 30 min idle. NOTE: Kconfig fragments do NOT strip trailing
# inline comments — a value like "1800000  # ..." is parsed whole and rejected.
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=1800000

# --- Pointing subsystem: trackball movement + mouse buttons + scroll ---
CONFIG_ZMK_POINTING=y
CONFIG_SPI=y
CONFIG_INPUT=y

# --- Capacitive touch: CAP1188 via Zephyr microchip,cap12xx (work item 2) ---
# Shares I2C1 (XIAO D4/D5) with the DRV2605L haptics (item 5).
CONFIG_I2C=y
CONFIG_INPUT_CAP12XX=y

# --- Haptics: DRV2605L via Zephyr ti,drv2605 driver (work item 5) ---
# HAPTICS is a menuconfig (not default-on); the drv2605 driver then enables
# itself from the devicetree. SETTINGS persists the LRA auto-cal results
# (already pulled in by BLE for bonds — explicit here because haptics rely
# on it too).
CONFIG_HAPTICS=y
CONFIG_SETTINGS=y

# --- PMW3610 trackball driver (badjeff module) ---
CONFIG_PMW3610_ALT=y
# CONFIG_PMW3610_ALT_REPORT_INTERVAL_MIN=12   # optional: tune wireless report rate

# --- Optional WS2812 underglow indicator (uses its own SPI/pin — off by default) ---
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# --- Debug over USB while bringing it up (comment out for release) ---
# CONFIG_ZMK_USB_LOGGING=y
