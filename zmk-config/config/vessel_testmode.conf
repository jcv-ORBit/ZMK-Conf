# ORBit manufacturing test mode (spec §6) — EXTRA_CONF_FILE overlay.
# Build: west build ... -- -DEXTRA_CONF_FILE=.../vessel_testmode.conf
# CI publishes this as the separate `vessel-testmode-xiao_ble` artifact.
# Never enable any of this in the shipping vessel.conf.

CONFIG_ORBIT_TEST_MODE=y

# Sensor dumps go to the USB CDC console.
CONFIG_ZMK_USB_LOGGING=y

# A test bench wants the device awake and lit indefinitely.
CONFIG_ZMK_SLEEP=n
# 24 h — keeps the glow's ACTIVE scene (and the LED walk) from idling off.
CONFIG_ZMK_IDLE_TIMEOUT=86400000
