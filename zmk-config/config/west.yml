manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: badjeff
      url-base: https://github.com/badjeff
  projects:
    - name: zmk
      remote: zmkfirmware
      # Pinned to a modern main SHA (Hardware Model v2, board `xiao_ble`,
      # Zephyr 4.1). Chosen so the CAP1188 can use Zephyr's stock
      # `microchip,cap12xx` input driver (absent from the older v0.3.0 /
      # Zephyr 3.5 line). Transitively pins Zephyr via app/west.yml.
      revision: 83bc82dbfdcda4ef392461202534a7cc337ca055
      import: app/west.yml
    # PMW3610 trackball driver (community). Pinned to a specific commit so a
    # green build stays reproducible instead of floating on the fork's main.
    - name: zmk-pmw3610-driver
      remote: badjeff
      revision: 44b4a76b74d293a93cec4ccb7e04cb8d29c10f93
  self:
    path: config
